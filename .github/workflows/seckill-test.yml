name: seckill-test

on:
  workflow_dispatch:
    inputs:
      seckill_after_minutes:
        description: "手动启动后几分钟开始抢购"
        required: true
        default: "5"
        type: string
      login_after_minutes:
        description: "手动启动后几分钟开始登录"
        required: true
        default: "1"
        type: string
      hard_stop_after_minutes:
        description: "手动启动后几分钟强制结束"
        required: true
        default: "6"
        type: string
      target_keyword:
        description: "测试商品关键词；留空则使用 h3/seckill_config.yml 的 batch10"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: read

jobs:
  run:
    uses: ./.github/workflows/seckill-reusable.yml
    with:
      batch_number: 10
      relative_timing: true
      login_after_minutes: ${{ inputs.login_after_minutes }}
      seckill_after_minutes: ${{ inputs.seckill_after_minutes }}
      hard_stop_after_minutes: ${{ inputs.hard_stop_after_minutes }}
      target_keyword: ${{ inputs.target_keyword }}
    secrets:
      ACCOUNTS_BATCH: ${{ secrets.ACCOUNTS_TEST }}
      PASSPORT_URL: ${{ secrets.PASSPORT_URL }}
      SLIDER_ID: ${{ secrets.SLIDER_ID }}
      WRAPPER_ID: ${{ secrets.WRAPPER_ID }}
      BASE_URL: ${{ secrets.BASE_URL }}
      SECKILL_BASE_URL: ${{ secrets.SECKILL_BASE_URL }}
      SECKILL_CATEGORY_ACCESS_ID: ${{ secrets.SECKILL_CATEGORY_ACCESS_ID }}
      SECKILL_REFERER: ${{ secrets.SECKILL_REFERER }}
      REFERER: ${{ secrets.REFERER }}
      JLC_REFERER: ${{ secrets.JLC_REFERER }}
      HEADER_CLIENT_TYPE: ${{ secrets.HEADER_CLIENT_TYPE }}
      HEADER_ACCESS_TOKEN: ${{ secrets.HEADER_ACCESS_TOKEN }}
      HEADER_ACCESS_TOKEN_FALLBACKS: ${{ secrets.HEADER_ACCESS_TOKEN_FALLBACKS }}
      HEADER_SECRET_KEY: ${{ secrets.HEADER_SECRET_KEY }}
      TOKEN_KEY: ${{ secrets.TOKEN_KEY }}
      TOKEN_ALTERNATIVE_KEYS: ${{ secrets.TOKEN_ALTERNATIVE_KEYS }}
      JLC_CLIENT_TYPE: ${{ secrets.JLC_CLIENT_TYPE }}
      JLC_SECRET_KEY_VALUE: ${{ secrets.JLC_SECRET_KEY_VALUE }}
      JLC_USE_HTTP2: ${{ secrets.JLC_USE_HTTP2 }}
      JLC_ACCEPT_LANGUAGE: ${{ secrets.JLC_ACCEPT_LANGUAGE }}
      BROWSER_VIEWPORT_WIDTH: ${{ secrets.BROWSER_VIEWPORT_WIDTH }}
      BROWSER_VIEWPORT_HEIGHT: ${{ secrets.BROWSER_VIEWPORT_HEIGHT }}
      BROWSER_DEVICE_SCALE_FACTOR: ${{ secrets.BROWSER_DEVICE_SCALE_FACTOR }}

  summary:
    name: Send test Telegram summary
    needs: run
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Download test batch result
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: seckill-batch10-result
          path: test-results

      - name: Send Telegram test summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_WORKFLOW_RESULT: ${{ needs.run.result }}
        shell: bash
        run: |
          python - <<'PY'
          import glob
          import html
          import json
          import os
          import urllib.parse
          import urllib.request
          import zipfile
          from datetime import datetime
          from zoneinfo import ZoneInfo

          local_tz = ZoneInfo("Asia/Shanghai")
          result_files = glob.glob("test-results/**/*.json", recursive=True)
          xlsx_path = datetime.now(local_tz).strftime("%Y-%m-%d测试秒杀.xlsx")

          def truthy(value):
              if value is True:
                  return True
              if value in (False, None):
                  return False
              return str(value).strip().lower() in {"1", "true", "yes", "y", "on"}

          def seckill_record(row):
              activity = row.get("activity_records") if isinstance(row.get("activity_records"), dict) else {}
              records = activity.get("seckill")
              if isinstance(records, list) and records and isinstance(records[0], dict):
                  return records[0]
              return {}

          def cell_text(value, limit=1200):
              if value is None:
                  return ""
              if isinstance(value, (dict, list)):
                  text = json.dumps(value, ensure_ascii=False, separators=(",", ":"))
              else:
                  text = str(value)
              text = " ".join(text.split())
              if len(text) <= limit:
                  return text
              return text[:limit] + f"...(truncated,len={len(text)})"

          def col_name(index):
              name = ""
              while index:
                  index, rem = divmod(index - 1, 26)
                  name = chr(65 + rem) + name
              return name

          def sheet_xml(rows):
              xml_rows = []
              for row_index, row in enumerate(rows, start=1):
                  cells = []
                  for col_index, value in enumerate(row, start=1):
                      ref = f"{col_name(col_index)}{row_index}"
                      text = html.escape(cell_text(value, 32000))
                      cells.append(f'<c r="{ref}" t="inlineStr"><is><t>{text}</t></is></c>')
                  xml_rows.append(f'<row r="{row_index}">{"".join(cells)}</row>')
              return (
                  '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
                  '<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">'
                  f'<sheetData>{"".join(xml_rows)}</sheetData>'
                  '</worksheet>'
              )

          def write_xlsx(path, rows):
              summary_rows = [[
                  "序号", "账号", "状态", "原因", "商品", "SKU", "商品ID",
                  "发包数", "RTT中位数(ms)", "服务器时差中位数(ms)", "成功发送时间", "成功返回时间"
              ]]
              stats_rows = [["序号", "账号", "商品", "发包数", "返回次数", "返回摘要", "首次返回", "成功返回"]]

              for index, row in enumerate(rows, start=1):
                  rec = seckill_record(row)
                  success = truthy(row.get("sign_success")) or truthy(rec.get("success"))
                  summary_rows.append([
                      index,
                      row.get("group_position") or row.get("account_index") or "",
                      "秒杀成功" if success else row.get("sign_status") or "秒杀失败",
                      row.get("detail_reason") or rec.get("last_response_message") or "",
                      rec.get("title") or "",
                      rec.get("sku_code") or "",
                      rec.get("goods_detail_access_id") or "",
                      rec.get("attempts_sent") or 0,
                      rec.get("median_rtt_ms") or "",
                      rec.get("median_server_delta_ms") or "",
                      rec.get("success_sent_at") or "",
                      rec.get("success_received_at") or "",
                  ])

                  counts = rec.get("response_counts")
                  if isinstance(counts, dict):
                      first = True
                      for summary, count in sorted(counts.items(), key=lambda item: (-int(item[1] or 0), item[0])):
                          stats_rows.append([
                              len(stats_rows),
                              row.get("group_position") or row.get("account_index") or "",
                              rec.get("title") or "",
                              rec.get("attempts_sent") or 0,
                              count,
                              summary,
                              rec.get("first_response") if first else "",
                              rec.get("success_response") if first else "",
                          ])
                          first = False

              content_types = """<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
              <Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
              <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
              <Default Extension="xml" ContentType="application/xml"/>
              <Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
              <Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>
              <Override PartName="/xl/worksheets/sheet2.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>
              <Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>
              </Types>"""
              rels = """<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
              <Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
              <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
              </Relationships>"""
              workbook = """<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
              <workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
              <sheets>
              <sheet name="测试汇总" sheetId="1" r:id="rId1"/>
              <sheet name="返回统计" sheetId="2" r:id="rId2"/>
              </sheets>
              </workbook>"""
              workbook_rels = """<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
              <Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
              <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>
              <Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet2.xml"/>
              <Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>
              </Relationships>"""
              styles = """<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
              <styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
              <fonts count="1"><font><sz val="11"/><name val="Calibri"/></font></fonts>
              <fills count="1"><fill><patternFill patternType="none"/></fill></fills>
              <borders count="1"><border/></borders>
              <cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>
              <cellXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/></cellXfs>
              </styleSheet>"""
              with zipfile.ZipFile(path, "w", zipfile.ZIP_DEFLATED) as archive:
                  archive.writestr("[Content_Types].xml", content_types)
                  archive.writestr("_rels/.rels", rels)
                  archive.writestr("xl/workbook.xml", workbook)
                  archive.writestr("xl/_rels/workbook.xml.rels", workbook_rels)
                  archive.writestr("xl/styles.xml", styles)
                  archive.writestr("xl/worksheets/sheet1.xml", sheet_xml(summary_rows))
                  archive.writestr("xl/worksheets/sheet2.xml", sheet_xml(stats_rows))

          def send_telegram_message(token, chat_id, text):
              data = urllib.parse.urlencode({"chat_id": chat_id, "text": text}).encode("utf-8")
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=data,
                  headers={"Content-Type": "application/x-www-form-urlencoded"},
              )
              with urllib.request.urlopen(req, timeout=30) as response:
                  body = response.read().decode("utf-8", errors="replace")
                  print(f"[telegram] message status={response.status} body={body[:300]}")

          def send_telegram_document(token, chat_id, path):
              boundary = "----seckill-test-boundary"
              filename = os.path.basename(path)
              with open(path, "rb") as file:
                  content = file.read()
              body = b"".join([
                  f"--{boundary}\r\n".encode(),
                  b'Content-Disposition: form-data; name="chat_id"\r\n\r\n',
                  chat_id.encode(),
                  b"\r\n",
                  f"--{boundary}\r\n".encode(),
                  f'Content-Disposition: form-data; name="document"; filename="{filename}"\r\n'.encode(),
                  b"Content-Type: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet\r\n\r\n",
                  content,
                  b"\r\n",
                  f"--{boundary}--\r\n".encode(),
              ])
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/sendDocument",
                  data=body,
                  headers={"Content-Type": f"multipart/form-data; boundary={boundary}"},
              )
              with urllib.request.urlopen(req, timeout=60) as response:
                  body_text = response.read().decode("utf-8", errors="replace")
                  print(f"[telegram] document status={response.status} body={body_text[:300]}")

          rows = []
          lines = [
              f"{datetime.now(local_tz).strftime('%Y-%m-%d %H:%M:%S')} 测试秒杀总结",
              f"Workflow: {os.getenv('TEST_WORKFLOW_RESULT', 'unknown')}",
          ]

          if not result_files:
              lines.append("结果: 未找到 seckill-batch10-result artifact，可能测试流程未跑到合并阶段。")
              rows.append({
                  "account_index": "",
                  "group_position": "测试汇总",
                  "sign_status": "未找到结果",
                  "detail_reason": "未找到 seckill-batch10-result artifact，可能测试流程未跑到合并阶段。",
                  "activity_records": {"seckill": [{}]},
              })
          else:
              for path in result_files:
                  try:
                      with open(path, "r", encoding="utf-8") as file:
                          payload = json.load(file)
                      payload_rows = payload.get("results") if isinstance(payload, dict) else None
                      if isinstance(payload_rows, list):
                          rows.extend(item for item in payload_rows if isinstance(item, dict))
                  except Exception as exc:
                      lines.append(f"读取结果失败: {path}: {type(exc).__name__}: {exc}")

              total = len(rows)
              success_rows = [row for row in rows if truthy(row.get("sign_success")) or truthy(seckill_record(row).get("success"))]
              failed_rows = [row for row in rows if row not in success_rows]
              attempts = sum(int(seckill_record(row).get("attempts_sent") or 0) for row in rows)
              lines.extend([
                  f"账号数: {total}",
                  f"成功: {len(success_rows)}",
                  f"失败: {len(failed_rows)}",
                  f"总发包数: {attempts}",
              ])

              if success_rows:
                  lines.append("成功账号:")
                  for row in success_rows[:20]:
                      rec = seckill_record(row)
                      lines.append(
                          f"- {row.get('group_position') or row.get('account_index')}: "
                          f"{rec.get('title') or row.get('sign_status') or '秒杀成功'}"
                      )

              if failed_rows:
                  lines.append("失败账号:")
                  for row in failed_rows[:30]:
                      rec = seckill_record(row)
                      reason = row.get("detail_reason") or rec.get("last_response_message") or row.get("sign_status") or "未知失败"
                      lines.append(f"- {row.get('group_position') or row.get('account_index')}: {reason[:180]}")
                  if len(failed_rows) > 30:
                      lines.append(f"...还有 {len(failed_rows) - 30} 个失败账号")

              response_counts = {}
              for row in rows:
                  counts = seckill_record(row).get("response_counts")
                  if not isinstance(counts, dict):
                      continue
                  for key, count in counts.items():
                      try:
                          response_counts[key] = response_counts.get(key, 0) + int(count)
                      except Exception:
                          pass
              if response_counts:
                  lines.append("返回统计 Top 8:")
                  for key, count in sorted(response_counts.items(), key=lambda item: (-item[1], item[0]))[:8]:
                      lines.append(f"- {count}x {key[:220]}")

          write_xlsx(xlsx_path, rows)
          lines.append(f"XLSX: {xlsx_path}")

          text = "\n".join(lines)
          print(text)

          token = os.getenv("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = os.getenv("TELEGRAM_CHAT_ID", "").strip()
          if not token or not chat_id:
              print("[telegram] skipped: TELEGRAM_BOT_TOKEN/TELEGRAM_CHAT_ID empty")
              raise SystemExit(0)

          try:
              send_telegram_message(token, chat_id, text)
              if os.path.exists(xlsx_path):
                  send_telegram_document(token, chat_id, xlsx_path)
          except Exception as exc:
              print(f"[telegram] failed: {type(exc).__name__}: {exc}")
              raise SystemExit(1)
          PY

      - name: Upload test summary xlsx
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seckill-test-summary-xlsx
          path: "*测试秒杀.xlsx"
          if-no-files-found: warn
          retention-days: 7
