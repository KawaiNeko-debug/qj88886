name: build-fc-image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to push"
        required: true
        default: "latest"
        type: string

permissions:
  contents: read

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check ACR secrets
        shell: bash
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
          ACR_REPOSITORY: ${{ secrets.ACR_REPOSITORY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          clean_text() {
            printf '%s' "$1" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'
          }
          missing=0
          for name in ACR_REGISTRY ACR_NAMESPACE ACR_REPOSITORY ACR_USERNAME ACR_PASSWORD; do
            value="$(clean_text "${!name}")"
            if [ -z "$value" ]; then
              echo "::error title=missing secret::$name is empty"
              missing=1
            fi
          done
          exit "$missing"

      - name: Normalize ACR config
        shell: bash
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
          ACR_REPOSITORY: ${{ secrets.ACR_REPOSITORY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          clean_text() {
            printf '%s' "$1" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'
          }
          clean_slug() {
            clean_text "$1" | tr -d '[:space:]'
          }
          clean_registry() {
            clean_slug "$1" | sed -e 's#^https\?://##' -e 's#/*$##'
          }
          {
            echo "CLEAN_ACR_REGISTRY=$(clean_registry "$ACR_REGISTRY")"
            echo "CLEAN_ACR_NAMESPACE=$(clean_slug "$ACR_NAMESPACE")"
            echo "CLEAN_ACR_REPOSITORY=$(clean_slug "$ACR_REPOSITORY")"
            echo "CLEAN_ACR_USERNAME=$(clean_text "$ACR_USERNAME")"
            echo "CLEAN_IMAGE_TAG=$(clean_slug "$IMAGE_TAG")"
            echo "CLEAN_ACR_PASSWORD<<__ACR_PASSWORD__"
            clean_text "$ACR_PASSWORD"
            echo
            echo "__ACR_PASSWORD__"
          } >> "$GITHUB_ENV"

      - name: Login to Alibaba Cloud ACR
        shell: bash
        run: |
          printf '%s' "$CLEAN_ACR_PASSWORD" | docker login --username "$CLEAN_ACR_USERNAME" --password-stdin "$CLEAN_ACR_REGISTRY"

      - name: Build and push FC image
        id: image
        shell: bash
        run: |
          IMAGE="$CLEAN_ACR_REGISTRY/$CLEAN_ACR_NAMESPACE/$CLEAN_ACR_REPOSITORY:$CLEAN_IMAGE_TAG"
          docker build -f fc/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          {
            echo "image=$IMAGE"
            echo "### FC image pushed"
            echo ""
            echo "\`$IMAGE\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Print image address
        run: |
          echo "FC container image:"
          echo "${{ steps.image.outputs.image }}"
