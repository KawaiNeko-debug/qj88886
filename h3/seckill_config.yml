defaults:
  source: 4
  seckill_enabled: true
  login_at: "09:50:00"
  seckill_at: "10:00:00"
  hard_stop_time: "10:01:00"
  prewarm_concurrency: 30
  burst_concurrency: 120
  burst_interval_ms: 10
  max_inflight: 480
  request_timeout_ms: 12000
  drain_grace_ms: 1000
  prewarm_server_arrival_lead_ms: 10
  active_window_ms: 3000
  fixed_lead_ms: 500
  calibration_interval_ms: 1500
  calibration_sample_size: 15
  time_is_enabled: true
  time_is_prefer: true
  time_is_url: "https://time.is/Unix_time_now"
  time_is_sample_count: 5
  time_is_timeout_seconds: 3
  time_is_max_rtt_ms: 2500
  rebind_before_seckill: true
  rebind_before_seckill_min_gap_ms: 2000
  response_log_limit: 50
  response_log_every: 200
  response_log_body_chars: 500
  list_path: "/api/activity/seckill/ns/getSeckillGoods"
  buy_path: "/api/activity/seckill/exchangeSeckillGoods"

batches:
  batch1:
    group_number: 1
    group_name: "seckill-batch1"
    target_keyword: "耳机"
    schedule_mode: "fixed"
    fixed_lead_ms: 500
  batch16:
    group_number: 16
    group_name: "seckill-test"
    target_keyword: "棉腰靠"
    schedule_mode: "fixed"
    fixed_lead_ms: 500
