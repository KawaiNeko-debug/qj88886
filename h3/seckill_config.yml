defaults:
  source: 4
  login_at: "09:50:00"
  seckill_at: "10:00:00"
  hard_stop_time: "10:01:00"
  prewarm_concurrency: 30
  burst_concurrency: 120
  burst_interval_ms: 10
  prewarm_server_arrival_lead_ms: 10
